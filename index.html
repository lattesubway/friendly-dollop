<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>friendly-dollop</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0d12;
        --fg: #e8ecf1;
        --muted: #9aa3b2;
        --accent: #4f8cff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(79,140,255,0.18), transparent 60%),
          radial-gradient(800px 500px at 100% 0%, rgba(120,80,255,0.14), transparent 60%),
          var(--bg);
        color: var(--fg);
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        max-width: 36rem;
        text-align: center;
      }
      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }
      p { color: var(--muted); line-height: 1.6; margin: 0.25rem 0; }
      .badge {
        display: inline-block;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: rgba(79,140,255,0.15);
        color: var(--accent);
        font-size: 0.85rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Live on Netlify</span>
      <h1>friendly-dollop</h1>
      <p>The site is up and running.</p>
      <p>Replace this page with your own content to get started.</p>
    </main>
  </body>
</html>
